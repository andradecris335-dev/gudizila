<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Figmazilla - Cadastro</title>
    <link rel="stylesheet" href="cadastro.css">
</head>
<body>

    <main class="main-container">
        <section class="cadastro-section">
            <h1 class="titulo-cadastro">CADASTRO</h1>
            
            <form action="index.html" class="cadastro-form">
                <div class="campo">
                    <label>Nome de usuário</label>
                    <input type="text" placeholder="digite aqui" class="input-padrao">
                </div>

                <div class="campo">
                    <label>E-mail</label>
                    <input type="email" placeholder="digite aqui" class="input-padrao">
                </div>

                <div class="campo">
                    <label>Senha</label>
                    <input type="password" placeholder="digite aqui" class="input-padrao">
                </div>

                <div class="campo">
                    <label>Confirmar senha</label>
                    <input type="password" placeholder="digite aqui"     w w wdadwclass="input-padrao">
                </div>

                <div class="termos">
                    <input type="checkbox" id="termos">
                    <label for="termos">Li e concordo com os Termos de Serviço e Política de Privacidade.</label>
                </div>

                <div class="botoes-row">
                    <button type="submit" class="btn-final">CRIAR CONTA</button>
                    <a href="index.html" class="btn-voltar">VOLTAR</a>
                </div>
            </form>
        </section>

        <aside class="social-box">
            <p>Ou, se preferir</p>
            
            <a href="#" class="btn-social">
                <img src="img/SSO Icon (1).png" alt="Google">
                <span>Entre com o Google</span>
            </a>

            <a href="#" class="btn-social">
                <img src="img/SSO Icon (2).png" alt="Steam">
                <span>Entre com o Steam</span>
            </a>

            <a href="#" class="btn-social">
                <img src="img/SSO Icon.png" alt="Discord">
                <span>Entre com o Discord</span>
            </a>
        </aside>
    </main>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Figmazilla Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="main-container">
        
        <form class="login-box">
            <div class="campo">
                <label>Usuário</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-circle-user"></i>
                    <input type="text" placeholder="Digite aqui...">
                </div>
            </div>

            <div class="campo">
                <label>Senha</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" placeholder="Digite aqui...">
                    <i class="fa-solid fa-eye" class="eye-icon"></i>
                </div>
            </div>

            <a href="#" class="forgot">Esqueci minha senha</a>
            <button type="submit" class="btn-entrar">ENTRAR</button>
        </form>

        <div class="register-container">
            <p>Novo por aqui?</p>
            
            <a href="cadastro.html" class="btn-criar">
                CRIAR CONTA <i class="fa-solid fa-circle-user"></i>
            </a>
        </div>

    </div>
</body>
</html>
